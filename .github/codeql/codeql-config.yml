# .github/codeql/codeql-config.yml — CodeQL configuration for GitHub's
# Default Setup for Code Scanning.
#
# Default Setup is enabled in repo Settings → Code security → Code
# scanning → Default. This file tells it to skip vendored code under
# third_party/ — md4c and Unity are pinned upstream projects whose
# source we don't own and don't modify. Findings against them are
# noise for our code review (e.g., Unity's float-equality assertion
# macros, md4c's commented-out prototypes).
#
# If a finding inside third_party/ ever matters (e.g., a vulnerability
# in a vendored version we'd want to patch), drop the filter for that
# path until the finding is resolved.

name: "Armadillo Editor — CodeQL Default Setup config"

paths-ignore:
  - third_party/**
